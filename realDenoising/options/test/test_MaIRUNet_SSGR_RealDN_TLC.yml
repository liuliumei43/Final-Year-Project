# SSGR RealDN test with TLC (Test-time Local Converter)
#
# TLC replaces nn.AdaptiveAvgPool2d(1) in ShuffleAttn with a local 128x128
# sliding-window avg pool at inference. Fixes train(128x128)/test(full-size)
# global-pool mismatch. Typical gain on SIDD: +0.05~0.1 dB, zero retraining.

name: test_MaIRUNet_SSGR_RealDN_TLC
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  test_1:
    name: SIDD-ValSet
    type: Dataset_PairedImage
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SIDD/val/target_crops
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SIDD/val/input_crops
    io_backend:
      type: disk

network_g:
  type: MaIRUNet_SSGR
  adapter_positions: ['dec1']
  adapter_stats_from_input: ['dec1']
  adapter_mode: subtractive
  adapter_var_kernel: 7
  adapter_gate_init_bias: -3.0
  adapter_noise_adaptive_gate: true
  adapter_spectral_mode: suppressive
  adapter_hf_shortcut_bound: 0.0
  freeze_backbone: false  # irrelevant at test time

  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  ssm_ratio: 2.0
  flp_ratio: 4.0
  mlp_ratio: 1.5
  bias: False
  dual_pixel_task: False
  img_size: 128
  scan_len: 4
  batch_size: 1
  dynamic_ids: False

path:
  # ★ v3.5b best checkpoint (peak 39.9130 @ 4k)
  pretrain_network_g: experiments/train_MaIRUNet_SSGR_RealDN/models/net_g_4000.pth
  strict_load_g: true

val:
  # ★ Enable TLC
  use_tlc: true
  tlc_train_size: [1, 3, 128, 128]   # training patch size

  suffix: ~
  window_size: 8
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 1

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

dist_params:
  backend: nccl
  port: 29513
