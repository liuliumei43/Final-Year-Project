# SSGR Deblur test config
name: test_MaIRUNet_SSGR_Deblur
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  test_1:
    name: GoPro-TestSet
    type: Dataset_PairedImage
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/GoPro/test/target.lmdb
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/GoPro/test/input.lmdb
    io_backend:
      type: lmdb

network_g:
  type: MaIRUNet_SSGR
  adapter_positions: ['enc2', 'enc3', 'lat']
  adapter_mode: additive
  adapter_var_kernel: 5
  adapter_gate_init_bias: -3.0
  adapter_noise_adaptive_gate: false
  adapter_spectral_mode: additive
  adapter_hf_shortcut_bound: 0.15
  freeze_backbone: false

  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  ssm_ratio: 2.0
  flp_ratio: 4.0
  mlp_ratio: 1.5
  bias: False
  dual_pixel_task: False
  img_size: 128
  scan_len: 4
  batch_size: 1
  dynamic_ids: False

path:
  # ★ 批量评估脚本会自动覆盖这个路径
  pretrain_network_g: experiments/train_MaIRUNet_SSGR_Deblur/models/net_g_latest.pth
  strict_load_g: false

val:
  window_size: 8
  tile: 768
  tile_overlap: 32
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 1

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

dist_params:
  backend: nccl
  port: 29513
