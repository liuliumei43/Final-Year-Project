# general settings
name: test_MaIR_RealDN_ppt
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  test_1:
    name: SIDD-Val
    type: Dataset_PairedImage
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SIDD/val/target_crops
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SIDD/val/input_crops
    io_backend:
      type: disk

network_g:
  type: MaIRUNet
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  ssm_ratio: 2.0
  flp_ratio: 4.0
  mlp_ratio: 1.5
  bias: False
  dual_pixel_task: False
  img_size: 128
  scan_len: 4
  batch_size: 8
  dynamic_ids: False

path:
  pretrain_network_g: /add02/users/yex/projects/2025-CVPR-MaIR/ckpt/MaIR_RealDN.pth
  strict_load_g: true

val:
  suffix: baseline_ppt
  window_size: 8
  save_img: true
  save_lq: true
  save_gt: true
  save_compare: true
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  max_num_images: 5
  pbar: true

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
