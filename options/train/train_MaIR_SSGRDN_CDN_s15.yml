# SSGR v3.1 — MaIR CDN σ=15 Denoising-Adapted Configuration
#
# SSGR v3.0 在 CDN σ=15 上的问题诊断：
#   - HF shortcut 把输入中的噪声高频旁路回输出 → 与去噪目标矛盾
#   - Spectral branch 加法增强（mag + delta）无区分地放大所有频率 → 放大噪声
#   - Spatial gate 用原始 variance → 混入噪声方差，无法区分结构 vs 噪声
#
# v3.1 通过配置适配去噪任务（同一个 SSGRAdapter 类）：
#   1. adapter_noise_adaptive_gate: true → signal_var = relu(var - noise_floor)
#   2. adapter_spectral_mode: 'multiplicative' → Wiener 式乘性滤波
#   3. adapter_hf_shortcut_bound: 0.0 → 关闭 HF shortcut

name: train_MaIR_SSGRDN_CDN_s15
model_type: MambaIRModel
scale: 1
num_gpu: 2
manual_seed: 10
find_unused_parameters: false

datasets:
  train:
    name: DFWB_RGB
    task: denoising_color
    noise: 15
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/DFWB_RGB/HQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/DFWB_RGB/HQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 64
    use_hflip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 16
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 500
    prefetch_mode: ~

  val_1:
    name: McMaster
    type: PairedImageDataset
    task: denoising_color
    noise: 15
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/McMasterHQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/McMasterHQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_2:
    name: Kodak24
    type: PairedImageDataset
    task: denoising_color
    noise: 15
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/Kodak24HQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/Kodak24HQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_3:
    name: CBSD68
    type: PairedImageDataset
    task: denoising_color
    noise: 15
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/CBSD68HQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/CBSD68HQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: MaIR_MLVGR
  freeze_backbone_after_load: true
  backbone_trainable_prefixes: []        # backbone 完全冻结，只训练 adapter

  # SSGR adapter with v3.1 denoising-adaptive config
  adapter_type: 'ssgr'
  adapter_stages: [0, 1, 2, 3, 4]
  adapter_bottleneck_ratio: 2
  adapter_var_kernel: 5
  adapter_gate_init_bias: -4.0                  # 更保守（sigmoid(-4)≈0.018）
  adapter_spectral_hidden_ratio: 0.25
  adapter_hf_shortcut_bound: 0.0                # ★ 关闭 HF shortcut
  adapter_noise_adaptive_gate: true             # ★ v3.1: 噪声自适应门控
  adapter_spectral_mode: 'multiplicative'       # ★ v3.1: Wiener 式乘性滤波
  adapter_spectral_modulation_bound: 0.2        # 乘性调制范围 [0.8, 1.2]

  # MaIR CDN backbone parameters
  upscale: 1
  in_chans: 3
  img_range: 1.
  d_state: 16
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  ssm_ratio: 1.3
  mlp_ratio: 2.0
  upsampler: ~
  resi_connection: '1conv'
  img_size: 64
  dynamic_ids: false
  scan_len: 4

path:
  pretrain_network_g: /add02/users/yex/projects/2025-CVPR-MaIR/ckpt/MaIR_CDN_s15.pth
  param_key_g: params
  strict_load_g: false
  resume_state: ~

train:
  ema_decay: 0.999
  grad_clip: 0.05
  sanitize_nonfinite_grads: true

  optim_g:
    type: Adam
    lr: !!float 2e-4              # adapter-only 训练
    backbone_lr_scale: 0.0        # backbone 完全冻结
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [100000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 100000
  warmup_iter: 3000

  # 只用 Charbonnier loss — 去噪任务不需要频域高频加权
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: 1000
  log_metric_freq: 1000
  val_freq_final: 1000
  val_milestone: 5000
  save_img: false
  avg_metric: psnr
  save_best_avg: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: 1000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29509
