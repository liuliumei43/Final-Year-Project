# SSGR v3.0 — MaIR CDN σ=15 Aggressive Fine-Tune
#
# Cross-task validation: SSGR adapter on Color Denoising (σ=15).
# Same aggressive finetune strategy as SR, adapted for CDN parameters.

name: train_MaIR_SSGR_CDN_s15_finetune_aggressive
model_type: MambaIRModel
scale: 1
num_gpu: 2
manual_seed: 10
find_unused_parameters: false

datasets:
  train:
    name: DFWB_RGB
    task: denoising_color
    noise: 15
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/DFWB_RGB/HQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/DFWB_RGB/HQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 64
    use_hflip: true
    use_rot: true
    use_shuffle: true
    num_worker_per_gpu: 16
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 500
    prefetch_mode: ~

  val_1:
    name: McMaster
    type: PairedImageDataset
    task: denoising_color
    noise: 15
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/McMasterHQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/McMasterHQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_2:
    name: Kodak24
    type: PairedImageDataset
    task: denoising_color
    noise: 15
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/Kodak24HQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/Kodak24HQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_3:
    name: CBSD68
    type: PairedImageDataset
    task: denoising_color
    noise: 15
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/CBSD68HQ
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/ColorDN/CBSD68HQ
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: MaIR_MLVGR
  freeze_backbone_after_load: true
  backbone_trainable_prefixes: ['conv_after_body', 'layers.0', 'layers.1', 'layers.2', 'layers.3', 'layers.4', 'layers.5']

  # SSGR adapter
  adapter_type: 'ssgr'
  adapter_stages: [0, 1, 2, 3, 4]
  adapter_bottleneck_ratio: 2
  adapter_var_kernel: 5
  adapter_gate_init_bias: -3.0
  adapter_spectral_hidden_ratio: 0.25
  adapter_hf_shortcut_bound: 0.15

  # MaIR CDN backbone parameters
  upscale: 1
  in_chans: 3
  img_range: 1.
  d_state: 16
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  ssm_ratio: 1.3
  mlp_ratio: 2.0
  upsampler: ~
  resi_connection: '1conv'
  img_size: 64
  dynamic_ids: false
  scan_len: 4

path:
  pretrain_network_g: /add02/users/yex/projects/2025-CVPR-MaIR/ckpt/MaIR_CDN_s15.pth
  param_key_g: params
  strict_load_g: false
  resume_state: ~

train:
  ema_decay: 0.999
  grad_clip: 0.05
  sanitize_nonfinite_grads: true

  optim_g:
    type: Adam
    lr: !!float 1.2e-4
    backbone_lr_scale: 0.1
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [200000]
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 200000
  warmup_iter: 5000

  # Charbonnier loss (same as CDN baseline)
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

  # FFT frequency loss (same strategy as SR)
  freq_opt:
    type: FFTFreqLoss
    loss_weight: 0.02
    use_high_freq_weight: true
    high_freq_gamma: 1.2

val:
  val_freq: 5000
  log_metric_freq: 5000
  val_freq_final: 1000
  val_milestone: 5000
  save_img: false
  avg_metric: psnr
  save_best_avg: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: 1000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29507
