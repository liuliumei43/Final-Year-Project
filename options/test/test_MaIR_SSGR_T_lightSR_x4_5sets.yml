name: test_MaIR_SSGR_T_lightSR_x4_5sets
model_type: MambaIRModel
scale: 4
num_gpu: 1
manual_seed: 10

datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Set5/HR
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Set5/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Set14/HR
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Set14/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  test_3:
    name: B100
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/B100/HR
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/B100/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Urban100/HR
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Urban100/LR_bicubic/X4
    filename_tmpl: '{}x4'
    io_backend:
      type: disk

  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Manga109/HR
    dataroot_lq: /add02/users/yex/projects/2025-CVPR-MaIR/datasets/SR/Test/Manga109/LR_bicubic/X4
    filename_tmpl: '{}_LRBI_x4'
    io_backend:
      type: disk

network_g:
  type: MaIR_MLVGR
  freeze_backbone_after_load: false
  backbone_trainable_prefixes: []

  adapter_type: 'ssgr'
  adapter_stages: [0, 1, 2]
  adapter_use_spatial: true
  adapter_use_spectral: true
  adapter_use_gate: true
  adapter_bottleneck_ratio: 2
  adapter_var_kernel: 5
  adapter_gate_init_bias: -3.0
  adapter_spectral_hidden_ratio: 0.25
  adapter_hf_shortcut_bound: 0.15

  upscale: 4
  in_chans: 3
  img_range: 1.0
  d_state: 1
  depths: [6, 6, 6, 6]
  embed_dim: 60
  ssm_ratio: 1.1
  mlp_ratio: 1.6
  upsampler: 'pixelshuffledirect'
  resi_connection: '1conv'
  img_size: 64
  dynamic_ids: false
  batch_size: 16
  scan_len: 8

path:
  pretrain_network_g: /add02/users/yex/projects/2025-CVPR-MaIR/experiments/train_MaIR_SSGR_T_lightSR_x4_finetune_aggressive/models/net_g_best_avg.pth
  param_key_g: params
  strict_load_g: true

val:
  selfensemble: false
  save_img: false
  suffix: ssgr_x4
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
